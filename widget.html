<!DOCTYPE html>
<html>
<head>
  <script src="https://js.zohostatic.com/crm/v2/ZohoEmbededAppSDK.min.js"></script>

  <style>
    body { font-family: Arial; padding: 20px; }
    textarea { width: 100%; height: 100px; padding: 10px; }
    button {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      background: #0ea5a4;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<h3>Send SMS</h3>

<div id="phone">Loading...</div>

<textarea id="message" placeholder="Type message"></textarea>

<button onclick="sendSMS()">Send</button>

<script>
let phoneNumber = "";

// Load Zoho record
ZOHO.embeddedApp.on("PageLoad", function(data) {

  const recordId = data.EntityId[0];

  ZOHO.CRM.API.getRecord({
    Entity: data.Entity,
    RecordID: recordId
  }).then(function(res) {

    const record = res.data[0];

    phoneNumber = record.Phone || record.Mobile;

    document.getElementById("phone").innerText =
      "To: " + phoneNumber;
  });
});

ZOHO.embeddedApp.init();

// Send SMS
async function sendSMS() {

  const message = document.getElementById("message").value;

  if (!message) {
    alert("Enter message");
    return;
  }

  try {
    const res = await fetch("https://YOUR_NGROK_URL/send-sms", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        destination: phoneNumber,
        message: message,
        fromNumber: "953"
      })
    });

    const data = await res.json();

    if (data.success) {
      alert("SMS sent ✅");
      ZOHO.CRM.UI.Popup.close();
    } else {
      alert("Failed ❌");
    }

  } catch (err) {
    alert("Error ❌");
  }
}
</script>

</body>
</html>
